---
version: '3.8'

services:
  ioranaseo:
    image: ${DOCKER_REGISTRY:-registry.example.com}/ioranaseo:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - PORT=3005
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXTAUTH_URL=https://${APP_DOMAIN}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    restart: unless-stopped
    labels:
      coolify.managed: "true"
      coolify.name: "IoranaSEO"
      coolify.description: "SEO Reporting & Content Audit Platform"
    networks:
      - coolify-network

networks:
  coolify-network:
    external: true
    name: coolify
